name: 构建可执行文件

on:
  push:
    tags:
      - 'v*'  # 推送版本标签时自动构建并发布，如 v1.0
  workflow_dispatch:  # 也可手动触发

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: 打包
        run: |
          pyinstaller --name "标准信息检索平台" --noconfirm --clean --windowed --onedir `
            --add-data "app.py;." --add-data "scraper.py;." `
            --hidden-import streamlit --hidden-import pandas --hidden-import requests --hidden-import bs4 `
            --hidden-import lxml --hidden-import html5lib `
            --hidden-import streamlit.web.cli --hidden-import streamlit.runtime.scriptrunner.magic_funcs `
            --collect-all streamlit --collect-all pandas `
            launcher.py

      - name: 压缩为 zip
        run: |
          Compress-Archive -Path "dist/标准信息检索平台/*" -DestinationPath "标准信息检索平台-Windows.zip"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: 标准信息检索平台-Windows
          path: 标准信息检索平台-Windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: 打包
        run: |
          pyinstaller --name "标准信息检索平台" --noconfirm --clean --windowed --onedir \
            --add-data "app.py:." --add-data "scraper.py:." \
            --hidden-import streamlit --hidden-import pandas --hidden-import requests --hidden-import bs4 \
            --hidden-import lxml --hidden-import html5lib \
            --hidden-import streamlit.web.cli --hidden-import streamlit.runtime.scriptrunner.magic_funcs \
            --collect-all streamlit --collect-all pandas \
            launcher.py

      - name: 压缩为 zip
        run: |
          ditto -c -k --sequesterRsrc "dist/标准信息检索平台" "标准信息检索平台-macOS.zip"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: 标准信息检索平台-macOS
          path: 标准信息检索平台-macOS.zip

  # 发布到 GitHub Releases（仅 tag 推送时触发）
  release:
    needs: [build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: 下载 Windows 构建产物
        uses: actions/download-artifact@v4
        with:
          name: 标准信息检索平台-Windows

      - name: 下载 macOS 构建产物
        uses: actions/download-artifact@v4
        with:
          name: 标准信息检索平台-macOS

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            标准信息检索平台-Windows.zip
            标准信息检索平台-macOS.zip
          generate_release_notes: true
